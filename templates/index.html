<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoControl - Oficina</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        h1 { color: #333; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏎️ AutoControl</h1>
        <h3>Cadastro de Veículo</h3>
        <form action="/cadastrar" method="POST">
            <input type="text" name="nome" placeholder="Nome do Cliente" required>
            <input type="text" name="modelo" placeholder="Modelo do Carro" required>
            <input type="text" name="placa" placeholder="Placa do Veículo" required>
            <button type="submit">Salvar no Sistema</button>
        </form>
        <hr>
<h3>Veículos Cadastrados</h3>
<ul style="text-align: left; list-style: none; padding: 0;">
    {% for v in veiculos %}
    <li style="background: #eee; margin: 5px 0; padding: 8px; border-radius: 4px;">
        <strong>{{ v[2] }}</strong> - {{ v[1] }} ({{ v[3] }})
    </li>
    {% endfor %}
</ul>
    </div>
</body>
</html>
