<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AutoControl - Oficina</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1, h3 { text-align: center; color: #333; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-search { background-color: #007bff; margin-bottom: 20px; }
        .btn-delete { color: #dc3545; text-decoration: none; font-weight: bold; margin-left: 10px; border: 1px solid #dc3545; padding: 2px 5px; border-radius: 3px; }
        .btn-delete:hover { background: #dc3545; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🏎️ AutoControl</h1>
        
        <h3>Cadastro de Veículo</h3>
        <form action="/cadastrar" method="POST">
            <input type="text" name="nome" placeholder="Nome do Cliente" required>
            <input type="text" name="modelo" placeholder="Modelo do Carro" required>
            <input type="text" name="placa" placeholder="Placa do Veículo" required>
            <button type="submit">Salvar no Sistema</button>
        </form>

        <hr>

        <h3>Buscar Veículo</h3>
        <form action="/" method="GET">
            <input type="text" name="search" placeholder="Buscar por nome ou placa...">
            <button type="submit" class="btn-search">🔍 Pesquisar</button>
        </form>

        <h3>Veículos Cadastrados</h3>
        <table>
            <thead>
                <tr>
                    <th>Cliente/Carro</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody>
                {% for veiculo in veiculos %}
                <tr>
                    <td><strong>{{ veiculo[1] }}</strong> - {{ veiculo[2] }} ({{ veiculo[3] }})</td>
                    <td>
                        <a href="/excluir/{{ veiculo[0] }}" class="btn-delete" onclick="return confirm('Excluir este registro?')">Excluir</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
